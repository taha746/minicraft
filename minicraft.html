<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>MiniCraft</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:sans-serif}
#wrap{position:relative;width:100vw;height:100vh;overflow:hidden}
canvas{display:block;width:100vw;height:100vh}
#cross{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:20px;pointer-events:none;display:none;z-index:10}
#cross::before,#cross::after{content:'';position:absolute;background:rgba(255,255,255,0.95);box-shadow:0 0 3px #000}
#cross::before{width:2px;height:100%;left:50%;transform:translateX(-50%)}
#cross::after{width:100%;height:2px;top:50%;transform:translateY(-50%)}
#hud{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);display:none;gap:3px;flex-direction:row;z-index:10}
.sl{width:46px;height:46px;border:2px solid #555;border-radius:3px;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px;cursor:pointer;user-select:none}
.sl.on{border-color:#fff;background:rgba(255,255,255,0.13)}
.slc{width:22px;height:22px;border-radius:2px}
.sln{color:#fff;font-size:8px}
#dbg{position:fixed;top:10px;right:14px;color:#fff;font-size:11px;background:rgba(0,0,0,0.45);padding:5px 10px;border-radius:6px;display:none;line-height:1.9;pointer-events:none;z-index:10}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.82);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:100}
#overlay h2{color:#fff;font-size:26px;font-weight:700}
#overlay p{color:#ccc;font-size:13px;text-align:center;line-height:2;max-width:320px}
#overlay button{padding:12px 36px;background:#4a9e4a;color:#fff;border:none;border-radius:7px;font-size:15px;cursor:pointer;font-weight:700}
#overlay button:hover{background:#3c8c3c}
#pauseOv{position:fixed;inset:0;background:rgba(0,0,0,0.65);display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:100}
#pauseOv h3{color:#fff;font-size:20px}
#pauseOv p{color:#aaa;font-size:12px}
#pauseOv button{padding:10px 28px;background:#555;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px}
#pauseOv button:hover{background:#666}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv"></canvas>
  <div id="cross"></div>
  <div id="hud"></div>
  <div id="dbg">FPS: <span id="fps">0</span><br>Pos: <span id="pos">-</span><br>Blok: <span id="bc">0</span></div>
  <div id="overlay">
    <h2>⛏️ MiniCraft</h2>
    <p>
      <b>Oyna</b>'ya bas → fare kilitlenir, imleç kaybolur<br>
      <b>Fare</b>: sonsuz bakış açısı<br>
      <b>Sol tık</b>: blok yık &nbsp;|&nbsp; <b>Sağ tık</b>: blok koy<br>
      <b>WASD / Ok</b>: yürü &nbsp;|&nbsp; <b>Boşluk</b>: zıpla<br>
      <b>Scroll</b>: blok seç &nbsp;|&nbsp; <b>ESC</b>: duraklat
    </p>
    <button id="startBtn">▶ Oyna</button>
  </div>
  <div id="pauseOv">
    <h3>⏸ Duraklatıldı</h3>
    <p>ESC veya aşağıdaki butona bas</p>
    <button id="resumeBtn">▶ Devam Et</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Renderer ──────────────────────────────────────────────────────────────────
const cv = document.getElementById('cv');
let W = window.innerWidth, H = window.innerHeight;
const renderer = new THREE.WebGLRenderer({canvas:cv, antialias:true});
renderer.setSize(W, H);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));

window.addEventListener('resize', ()=>{
  W = window.innerWidth; H = window.innerHeight;
  renderer.setSize(W, H);
  camera.aspect = W/H;
  camera.updateProjectionMatrix();
});

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 22, 50);

const camera = new THREE.PerspectiveCamera(70, W/H, 0.05, 80);

// ── Lights ────────────────────────────────────────────────────────────────────
const sun = new THREE.DirectionalLight(0xfff5d0, 1.1);
sun.position.set(20, 40, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.left = -40; sun.shadow.camera.right = 40;
sun.shadow.camera.top  =  40; sun.shadow.camera.bottom = -40;
sun.shadow.camera.far  = 120;
scene.add(sun);
scene.add(new THREE.AmbientLight(0x9bbfdf, 0.65));
scene.add(new THREE.HemisphereLight(0x87CEEB, 0x3a5c20, 0.35));

// ── Block types ───────────────────────────────────────────────────────────────
const BT = [
  {name:'Çim',   top:0x4a7c2f, side:0x7a5230, bot:0x6b4020},
  {name:'Taş',   top:0x888888, side:0x777777, bot:0x666666},
  {name:'Toprak',top:0x7a5230, side:0x7a5230, bot:0x7a5230},
  {name:'Kum',   top:0xd6c660, side:0xd6c660, bot:0xd6c660},
  {name:'Ahşap', top:0x7a5520, side:0x8a6030, bot:0x7a5520},
  {name:'Yaprak',top:0x2a6015, side:0x2a6015, bot:0x2a6015},
  {name:'Tuğla', top:0x9a5540, side:0x8a4830, bot:0x7a4028},
  {name:'Kar',   top:0xeeeeff, side:0xddddee, bot:0xccccdd},
  {name:'Cam',   top:0x88bbee, side:0x88bbee, bot:0x88bbee},
];
function mkMats(bt){
  return [bt.side,bt.side,bt.top,bt.bot,bt.side,bt.side]
    .map(c => new THREE.MeshLambertMaterial({color:c}));
}
const GEO  = new THREE.BoxGeometry(1,1,1);
const EGEO = new THREE.EdgesGeometry(GEO);
const EMAT = new THREE.LineBasicMaterial({color:0x000000, transparent:true, opacity:0.13});

// ── World ─────────────────────────────────────────────────────────────────────
const occupied = new Set();
const meshMap  = new Map();

function wk(x,y,z){ return (x|0)+','+(y|0)+','+(z|0); }
function isOcc(x,y,z){ return occupied.has(wk(Math.floor(x), Math.floor(y), Math.floor(z))); }

function addBlock(x,y,z, ti, noEdge){
  x=x|0; y=y|0; z=z|0;
  const k = wk(x,y,z); if(occupied.has(k)) return;
  const m = new THREE.Mesh(GEO, mkMats(BT[ti]));
  m.position.set(x+.5, y+.5, z+.5);
  m.castShadow = m.receiveShadow = true;
  m.userData = {bx:x, by:y, bz:z, ti};
  if(!noEdge) m.add(new THREE.LineSegments(EGEO, EMAT));
  scene.add(m); occupied.add(k); meshMap.set(k, m);
}
function removeBlock(x,y,z){
  const k = wk(x,y,z); if(!occupied.has(k)) return;
  scene.remove(meshMap.get(k));
  occupied.delete(k); meshMap.delete(k);
  document.getElementById('bc').textContent = occupied.size;
}

// ── Terrain ───────────────────────────────────────────────────────────────────
function ht(x,z){ return 5 + Math.round(Math.sin(x*.28)*1.8 + Math.cos(z*.22)*1.8 + Math.sin((x+z)*.15)*1.2); }
let SPAWN_Y = 12;
(function genTerrain(){
  const S = 22;
  for(let x=-S; x<S; x++) for(let z=-S; z<S; z++){
    const h = ht(x,z);
    if(x===0 && z===0) SPAWN_Y = h+3;
    addBlock(x,h,z,0,true);
    addBlock(x,h-1,z,2,true); addBlock(x,h-2,z,2,true);
    for(let y=h-3; y>=0; y--) addBlock(x,y,z,1,true);
    if(Math.random()<.04 && Math.abs(x)>3 && Math.abs(z)>3){
      const th = 4+Math.floor(Math.random()*2);
      for(let ty=1; ty<=th; ty++) addBlock(x,h+ty,z,4,true);
      for(let lx=-2;lx<=2;lx++) for(let lz=-2;lz<=2;lz++) for(let ly=th-1;ly<=th+2;ly++)
        if(Math.abs(lx)+Math.abs(lz)+Math.abs(ly-th)<=3) addBlock(x+lx,h+ly,z+lz,5,true);
    }
  }
  meshMap.forEach(m=>{ if(!m.children.length) m.add(new THREE.LineSegments(EGEO,EMAT)); });
  document.getElementById('bc').textContent = occupied.size;
})();

// ── Physics ───────────────────────────────────────────────────────────────────
const GRAV=20, JUMP=7.5, SPD=4.4, EW=0.29, EHTOP=1.74;
const pl = {x:0, y:SPAWN_Y, z:0, vy:0, yaw:0, pitch:0, onGround:false};

function movePlayer(dt){
  const fwd = [-Math.sin(pl.yaw), -Math.cos(pl.yaw)];
  const rgt = [ Math.cos(pl.yaw), -Math.sin(pl.yaw)];
  let mx=0, mz=0;
  if(K.fwd){mx+=fwd[0];mz+=fwd[1]}
  if(K.bck){mx-=fwd[0];mz-=fwd[1]}
  if(K.lft){mx-=rgt[0];mz-=rgt[1]}
  if(K.rgt){mx+=rgt[0];mz+=rgt[1]}
  const l = Math.sqrt(mx*mx+mz*mz); if(l>0){mx/=l;mz/=l;}
  if(K.jmp && pl.onGround){ pl.vy=JUMP; pl.onGround=false; }
  pl.vy -= GRAV*dt;

  // X
  const nx = pl.x + mx*SPD*dt;
  if(mx!==0){
    const bx = Math.floor(nx + (mx>0?EW:-EW));
    const bz0=Math.floor(pl.z-EW), bz1=Math.floor(pl.z+EW);
    const y0=Math.floor(pl.y+0.05), y1=Math.floor(pl.y+EHTOP-0.05);
    let col=false;
    for(let bz=bz0;bz<=bz1&&!col;bz++) for(let y=y0;y<=y1&&!col;y++) if(isOcc(bx,y,bz)) col=true;
    if(!col) pl.x=nx;
  }

  // Z
  const nz = pl.z + mz*SPD*dt;
  if(mz!==0){
    const bz = Math.floor(nz + (mz>0?EW:-EW));
    const bx0=Math.floor(pl.x-EW), bx1=Math.floor(pl.x+EW);
    const y0=Math.floor(pl.y+0.05), y1=Math.floor(pl.y+EHTOP-0.05);
    let col=false;
    for(let bx=bx0;bx<=bx1&&!col;bx++) for(let y=y0;y<=y1&&!col;y++) if(isOcc(bx,y,bz)) col=true;
    if(!col) pl.z=nz;
  }

  // Y
  const ny = pl.y + pl.vy*dt;
  if(pl.vy<=0){
    const footY = Math.floor(ny-0.001);
    let hit=false;
    const bx0=Math.floor(pl.x-EW), bx1=Math.floor(pl.x+EW);
    const bz0=Math.floor(pl.z-EW), bz1=Math.floor(pl.z+EW);
    for(let bx=bx0;bx<=bx1&&!hit;bx++) for(let bz=bz0;bz<=bz1&&!hit;bz++) if(isOcc(bx,footY,bz)) hit=true;
    if(hit){ pl.y=footY+1.0; pl.vy=0; pl.onGround=true; }
    else   { pl.y=ny; pl.onGround=false; }
  } else {
    const headY = Math.floor(ny+EHTOP+0.001);
    let hit=false;
    const bx0=Math.floor(pl.x-EW), bx1=Math.floor(pl.x+EW);
    const bz0=Math.floor(pl.z-EW), bz1=Math.floor(pl.z+EW);
    for(let bx=bx0;bx<=bx1&&!hit;bx++) for(let bz=bz0;bz<=bz1&&!hit;bz++) if(isOcc(bx,headY,bz)) hit=true;
    if(hit) pl.vy=0; else pl.y=ny;
    pl.onGround=false;
  }
  if(pl.y<-15){ pl.x=0; pl.z=0; pl.y=SPAWN_Y; pl.vy=0; }
}

// ── Pointer Lock ──────────────────────────────────────────────────────────────
let locked = false;
let playing = false, paused = false;

document.addEventListener('pointerlockchange', ()=>{
  locked = (document.pointerLockElement === cv);
  if(!locked && playing && !paused){
    // Fare kilidi dışarıdan kırıldı → duraklat
    paused = true;
    document.getElementById('pauseOv').style.display = 'flex';
  }
});
document.addEventListener('pointerlockerror', ()=>{
  console.warn('Pointer lock reddedildi.');
});

function requestLock(){
  cv.requestPointerLock();
}

document.addEventListener('mousemove', e=>{
  if(!locked || !playing || paused) return;
  pl.yaw   -= e.movementX * 0.002;
  pl.pitch  = Math.max(-1.45, Math.min(1.45, pl.pitch - e.movementY * 0.002));
});

// ── Klavye ────────────────────────────────────────────────────────────────────
const K = {fwd:false, bck:false, lft:false, rgt:false, jmp:false};
document.addEventListener('keydown', e=>{
  if(e.code==='KeyW'||e.code==='ArrowUp')    K.fwd=true;
  if(e.code==='KeyS'||e.code==='ArrowDown')  K.bck=true;
  if(e.code==='KeyA'||e.code==='ArrowLeft')  K.lft=true;
  if(e.code==='KeyD'||e.code==='ArrowRight') K.rgt=true;
  if(e.code==='Space'){ K.jmp=true; e.preventDefault(); }
  if(e.code==='Escape' && playing){
    if(!paused){
      paused=true;
      document.getElementById('pauseOv').style.display='flex';
      document.exitPointerLock();
    } else {
      paused=false;
      document.getElementById('pauseOv').style.display='none';
      requestLock();
    }
  }
});
document.addEventListener('keyup', e=>{
  if(e.code==='KeyW'||e.code==='ArrowUp')    K.fwd=false;
  if(e.code==='KeyS'||e.code==='ArrowDown')  K.bck=false;
  if(e.code==='KeyA'||e.code==='ArrowLeft')  K.lft=false;
  if(e.code==='KeyD'||e.code==='ArrowRight') K.rgt=false;
  if(e.code==='Space') K.jmp=false;
});

// ── Mouse click (break/place) ─────────────────────────────────────────────────
cv.addEventListener('mousedown', e=>{
  if(!playing || paused) return;
  if(!locked){ requestLock(); return; }
  if(e.button===0) doBreak();
  if(e.button===2) doPlace();
});
cv.addEventListener('contextmenu', e=>e.preventDefault());

// ── Hotbar ────────────────────────────────────────────────────────────────────
let sel = 0;
const HOTBAR = [0,1,2,3,4,5,6,7,8];
function buildHUD(){
  const h = document.getElementById('hud'); h.innerHTML='';
  HOTBAR.forEach((ti,i)=>{
    const d = document.createElement('div');
    d.className = 'sl'+(i===sel?' on':'');
    d.innerHTML = `<div class="slc" style="background:#${BT[ti].top.toString(16).padStart(6,'0')}"></div><span class="sln">${BT[ti].name}</span>`;
    d.onclick = ()=>{ sel=i; buildHUD(); };
    h.appendChild(d);
  });
}
buildHUD();
document.addEventListener('wheel', e=>{ sel=(sel+Math.sign(e.deltaY)+9)%9; buildHUD(); }, {passive:true});

// ── Raycasting ─────────────────────────────────────────────────────────────────
const ray = new THREE.Raycaster(undefined, undefined, 0, 6.5);
const hlMesh = new THREE.Mesh(
  new THREE.BoxGeometry(1.04,1.04,1.04),
  new THREE.MeshBasicMaterial({color:0x000000, transparent:true, opacity:0.22, wireframe:true})
);
hlMesh.visible=false; scene.add(hlMesh);

function getHit(){
  const dir = new THREE.Vector3(0,0,-1).applyEuler(new THREE.Euler(pl.pitch, pl.yaw, 0,'YXZ'));
  ray.set(new THREE.Vector3(pl.x, pl.y+1.62, pl.z), dir);
  const hits = ray.intersectObjects(Array.from(meshMap.values()));
  return hits.length ? hits[0] : null;
}
function doBreak(){
  const h=getHit(); if(!h) return;
  removeBlock(h.object.userData.bx, h.object.userData.by, h.object.userData.bz);
  hlMesh.visible=false;
}
function doPlace(){
  const h=getHit(); if(!h) return;
  const n=h.face.normal;
  const bx=h.object.userData.bx+Math.round(n.x);
  const by=h.object.userData.by+Math.round(n.y);
  const bz=h.object.userData.bz+Math.round(n.z);
  if(Math.abs(bx-pl.x)<1 && Math.abs(bz-pl.z)<1 && by>=Math.floor(pl.y) && by<=Math.floor(pl.y+EHTOP)) return;
  addBlock(bx,by,bz,HOTBAR[sel]);
  document.getElementById('bc').textContent=occupied.size;
}

// ── Clouds ────────────────────────────────────────────────────────────────────
const cMat = new THREE.MeshBasicMaterial({color:0xffffff, transparent:true, opacity:0.82});
const clouds = Array.from({length:14}, ()=>{
  const c = new THREE.Mesh(new THREE.BoxGeometry(4+Math.random()*3,.6,2+Math.random()*2), cMat);
  c.position.set((Math.random()-.5)*70, 22+Math.random()*4, (Math.random()-.5)*70);
  scene.add(c); return c;
});

// ── Start / Pause ─────────────────────────────────────────────────────────────
document.getElementById('startBtn').onclick = ()=>{
  document.getElementById('overlay').style.display='none';
  document.getElementById('cross').style.display='block';
  document.getElementById('hud').style.display='flex';
  document.getElementById('dbg').style.display='block';
  playing=true;
  requestLock();
};
document.getElementById('resumeBtn').onclick = ()=>{
  paused=false;
  document.getElementById('pauseOv').style.display='none';
  requestLock();
};

// ── Loop ──────────────────────────────────────────────────────────────────────
let lastT=performance.now(), fpsCnt=0, fpsT=performance.now();
function loop(now){
  requestAnimationFrame(loop);
  if(!playing || paused) return;
  const dt = Math.min((now-lastT)/1000, .05); lastT=now;

  fpsCnt++;
  if(now-fpsT>600){
    document.getElementById('fps').textContent = Math.round(fpsCnt*1000/(now-fpsT));
    fpsCnt=0; fpsT=now;
  }

  movePlayer(dt);

  camera.position.set(pl.x, pl.y+1.62, pl.z);
  camera.rotation.order='YXZ';
  camera.rotation.y=pl.yaw;
  camera.rotation.x=pl.pitch;

  const hit=getHit();
  if(hit){ const m=hit.object; hlMesh.position.set(m.userData.bx+.5,m.userData.by+.5,m.userData.bz+.5); hlMesh.visible=true; }
  else hlMesh.visible=false;

  clouds.forEach(c=>{ c.position.x+=.015; if(c.position.x>36) c.position.x=-36; });
  document.getElementById('pos').textContent=`${Math.round(pl.x)}, ${Math.round(pl.y)}, ${Math.round(pl.z)}`;
  renderer.render(scene, camera);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
